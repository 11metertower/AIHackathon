<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 RAG 챗봇</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .category-btn { padding: 10px 15px; border: none; border-radius: 5px; background-color: #007bff; color: white; cursor: pointer; transition: background 0.3s; }
        .category-btn:hover { background-color: #0056b3; }
        .category-btn.active { background-color: #28a745; font-weight: bold; }
        #chat-window { height: 400px; border: 1px solid #ddd; border-radius: 5px; overflow-y: auto; padding: 15px; margin-bottom: 15px; background-color: #fafafa; }
        .message { margin-bottom: 10px; padding: 10px; border-radius: 5px; max-width: 80%; }
        .user-message { background-color: #e9ecef; align-self: flex-end; margin-left: auto; text-align: right; }
        .bot-message { background-color: #d1ecf1; color: #0c5460; align-self: flex-start; }
        .input-area { display: flex; gap: 10px; }
        #query-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        #send-btn { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { font-size: 0.9em; color: #666; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>이메일 비서 챗봇</h1>
    
    <div id="status">카테고리를 먼저 선택해주세요.</div>
    <div class="category-buttons" id="category-container">
        <!-- 버튼이 여기에 동적으로 생성됨 -->
    </div>

    <div id="chat-window">
        <div class="message bot-message">안녕하세요! 도움을 드릴 카테고리를 선택하고 질문해주세요.</div>
    </div>

    <div class="input-area">
        <input type="text" id="query-input" placeholder="질문을 입력하세요..." disabled>
        <button id="send-btn" disabled>전송</button>
    </div>
</div>

<script>
    let selectedCategory = "";
    const chatWindow = document.getElementById('chat-window');
    const queryInput = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');
    const statusText = document.getElementById('status');

    // 카테고리 로드
    fetch('/categories')
        .then(res => res.json())
        .then(categories => {
            const container = document.getElementById('category-container');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                container.appendChild(btn);
            });
        });

    function selectCategory(cat, btn) {
        selectedCategory = cat;
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusText.innerText = `'${cat}' 카테고리가 선택되었습니다.`;
        queryInput.disabled = false;
        sendBtn.disabled = false;
        queryInput.focus();
    }

    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function sendMessage() {
        const query = queryInput.value.trim();
        if (!query || !selectedCategory) return;

        addMessage(query, true);
        queryInput.value = "";
        
        // 로딩 표시
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot-message';
        loadingDiv.innerText = "답변을 생성 중입니다...";
        chatWindow.appendChild(loadingDiv);

        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, category: selectedCategory })
        })
        .then(res => res.json())
        .then(data => {
            chatWindow.removeChild(loadingDiv);
            addMessage(data.response, false);
        })
        .catch(err => {
            chatWindow.removeChild(loadingDiv);
            addMessage("에러가 발생했습니다: " + err, false);
        });
    }

    sendBtn.onclick = sendMessage;
    queryInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
