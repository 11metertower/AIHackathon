<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>받은 메일함 - Contextual Mail Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>AI 메일 분류 중...</p>
    </div>

    <div class="container">
        <aside class="sidebar">
            <h2>Mail Tracker</h2>
            <nav>
                <ul id="mailbox-list">
                    <li><a href="{{ url_for('inbox') }}" class="active">받은 메일함</a></li>
                    <!-- 동적으로 카테고리가 추가될 영역 -->
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #34495e;">
                <p style="font-size: 0.8rem; color: #bdc3c7;">{{ session['user_id'] }}</p>
                <a href="{{ url_for('logout') }}" style="color: #e74c3c; text-decoration: none; font-size: 0.9rem;">로그아웃</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>받은 메일함</h1>
                <button id="btn-ai-classify" class="btn-ai">AI 메일 분류</button>
            </div>

            <div class="email-list">
                {% for email in emails %}
                <div class="email-item" onclick="location.href='{{ url_for('mail_view', mail_id=loop.index0) }}'">
                    <div class="email-info">
                        <div class="email-title">{{ email['Title'] }}</div>
                        <div class="email-sender">{{ email['Sender'] }}</div>
                    </div>
                    <div class="email-date">{{ email['Date'] }}</div>
                </div>
                {% else %}
                <div style="padding: 20px; text-align: center; color: #7f8c8d;">메일이 없습니다.</div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script>
        document.getElementById('btn-ai-classify').addEventListener('click', function() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';

            // 가상의 딜레이 (2초)
            setTimeout(function() {
                fetch('/api/categories')
                    .then(response => response.json())
                    .then(categories => {
                        const list = document.getElementById('mailbox-list');
                        // 기존 목록 유지하고 카테고리 추가
                        categories.forEach(cat => {
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.href = '/mailbox/' + encodeURIComponent(cat);
                            a.textContent = cat;
                            li.appendChild(a);
                            list.appendChild(li);
                        });
                        overlay.style.display = 'none';
                        alert('메일 분류가 완료되었습니다!');
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        overlay.style.display = 'none';
                    });
            }, 2000);
        });
    </script>
</body>
</html>
